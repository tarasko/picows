# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: run tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools Cython flake8
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  mypy-checks:
    strategy:
      matrix:
        pyver: ['3.9', '3.10', '3.11', '3.12', '>=3.13.5', '3.14']
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -r requirements-test.txt

      - name: Run mypy
        run: |
          mypy picows  # Replace with your library directory

  build:
    strategy:
      matrix:
        pyver: ['3.9', '3.10', '3.11', '3.12', '>=3.13.5', '3.14', '3.14t']
        os: [ubuntu, macos, windows]
      fail-fast: false

    runs-on: ${{ matrix.os }}-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.pyver }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.pyver }}

    - name: Show Python build OPT flags (they are automatically added when building extensions)
      run: python -c "import sysconfig; print(sysconfig.get_config_var('OPT'))"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Install OpenSSL (macOS)
      if: runner.os == 'macOS'
      run: |
        set -eux
        brew install openssl@3
        OPENSSL_PREFIX="$(brew --prefix openssl@3)"
        echo "OPENSSL_INCLUDE_DIR=${OPENSSL_PREFIX}/include" >> "$GITHUB_ENV"
        PY_SSL_LIB_DIR="$(python - <<'PY'
import sys
from pathlib import Path

for candidate in (Path(sys.prefix) / "lib", Path(sys.base_prefix) / "lib", Path(sys.exec_prefix) / "lib"):
    if candidate.exists() and any(candidate.glob("libssl*.dylib")) and any(candidate.glob("libcrypto*.dylib")):
        print(candidate)
        break
PY
)"
        if [ -n "${PY_SSL_LIB_DIR}" ]; then
          echo "OPENSSL_LIB_DIR=${PY_SSL_LIB_DIR}" >> "$GITHUB_ENV"
        else
          echo "OPENSSL_LIB_DIR=${OPENSSL_PREFIX}/lib" >> "$GITHUB_ENV"
        fi

    - name: Install OpenSSL (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install openssl --no-progress -y
        $includeDir = Get-ChildItem "C:\Program Files","C:\Program Files (x86)" -Recurse -Filter ssl.h -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -like "*\include\openssl\ssl.h" } |
          Select-Object -First 1 -ExpandProperty Directory |
          ForEach-Object { Split-Path $_ -Parent }
        if (-not $includeDir) { throw "OpenSSL include dir not found" }
        $libFile = Get-ChildItem "C:\Program Files","C:\Program Files (x86)" -Recurse -Filter "libssl*.lib" -ErrorAction SilentlyContinue |
          Select-Object -First 1
        if (-not $libFile) { throw "OpenSSL import library libssl*.lib not found" }
        $libDir = $libFile.Directory.FullName
        "OPENSSL_INCLUDE_DIR=$includeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "OPENSSL_LIB_DIR=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Compile Cython extensions
      run: |
        python setup.py build_ext --inplace

    - name: Run tests
      run: |
        pytest -v
        
